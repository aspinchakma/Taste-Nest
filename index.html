<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taste Nest</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Font awesome setup -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <!-- Navigation section -->
      <nav>
        <div class="logo">
          <img src="images/logo.png" alt="" />
        </div>
        <ul class="navigation-middle">
          <li><a href="#">Home</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Shop</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <div class="navigation_right_section">
          <div>
            <div class="nav_cart">
              <p>0</p>
              <i class="fa-solid fa-basket-shopping"></i>
            </div>
          </div>
          <button>Contact Us</button>
          <div class="side_bar_container">
            <i class="fa-solid fa-bars-staggered"></i>
          </div>
        </div>
      </nav>
      <!-- banner section or hero section -->
      <div class="hero_container">
        <div class="hero_content_container">
          <div class="hero_left_container">
            <p class="slogan">Crispy, Every Bite Taste</p>
            <h1>hot spicy chiken burger</h1>
            <p class="limited_offer_text">
              <span class="limited_offer_text_left">Limited Offer</span> /
              <span>$5</span>
            </p>
            <div>
              <button>Order Now</button>
            </div>
          </div>
          <div class="hero_right_container">
            <img src="images/burger-3.png.png" alt="" />
          </div>
        </div>
      </div>
    </header>

    <main></main>
  </body>
</html>
